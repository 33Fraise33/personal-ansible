---
- name: Converge Photon role
  hosts: all
  gather_facts: false
  vars:
    photon_image: python
    photon_version: 3.13-alpine
    photon_command:
      - python
      - -m
      - http.server
      - "2322"
    photon_database_path: /tmp/molecule-photon-data
    photon_port: 12322
  roles:
    - role: photon
  tasks:
    - name: Pause for Photon runtime inspection
      ansible.builtin.pause:
        seconds: 5
